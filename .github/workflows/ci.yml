name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync
        run: uv sync --group lint
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Sync
        run: uv sync --group typecheck
      - name: Mypy
        run: uv run mypy

  test:
    # The default suite is pure Python — static repo checks + fakes. The MLX /
    # smoke / gpu / network tests are gated out below, so it runs on Linux.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        run: pip install uv
      - name: Sync (test group only — keep CI light)
        run: uv sync --group test
      - name: Run tests
        run: |
          uv run pytest \
            --cov=mlx_model_doctor \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -m "not benchmark and not network and not gpu and not smoke"
